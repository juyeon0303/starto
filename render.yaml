# Render Blueprint — GitHub 연동 후 New > Blueprint > 이 repo 선택
services:
  - type: web
    name: starto
    runtime: static
    branch: main
    buildCommand: echo "Static site — no build"
    staticPublishPath: .
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=86400
      - path: /css/*
        name: Cache-Control
        value: public, max-age=86400
      - path: /js/*
        name: Cache-Control
        value: public, max-age=86400
